spring:
  datasource:
    url: jdbc:mysql://localhost:3308/library
    username: onion
    password: ring
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
  flyway:
    placeholders:
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: '${ADMIN_PASSWORD_HASH}'
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration: ${JWT_ACCESS_EXPIRATION_TIME} # 15 minutes
      refresh-token-expiration: ${JWT_REFRESH_EXPIRATION_TIME} # 7 days
